upstream plexclean {
    server unix:/run/plexclean/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    location /static/ {
        alias /opt/plexclean/staticfiles/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://plexclean;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
