<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Opruimarr{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #1a1a2e; color: #eee; }
    nav { background: #16213e; padding: 0.8rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #a8b2d1; text-decoration: none; font-weight: 500; }
    nav a:hover, nav a.active { color: #e94560; }
    nav .brand { font-size: 1.2rem; font-weight: 700; color: #e94560; margin-right: auto; }
    .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .messages { list-style: none; padding: 0; }
    .messages li { padding: 0.6rem 1rem; margin-bottom: 0.5rem; border-radius: 4px; }
    .messages .success { background: #1b4332; color: #95d5b2; }
    .messages .warning { background: #6b3a00; color: #ffd166; }
    .messages .error { background: #5c1a1a; color: #ff8a8a; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem 0.7rem; text-align: left; border-bottom: 1px solid #2a2a4a; }
    th { background: #16213e; position: sticky; top: 0; }
    th a { color: #a8b2d1; text-decoration: none; }
    th a:hover { color: #e94560; }
    tr:hover { background: #1f1f3a; }
    .flagged { background: #3d1f1f !important; }
    .btn { display: inline-block; padding: 0.5rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; text-decoration: none; color: #fff; }
    .btn-primary { background: #e94560; }
    .btn-primary:hover { background: #c73e54; }
    .btn-danger { background: #b91c1c; }
    .btn-danger:hover { background: #991b1b; }
    .btn-secondary { background: #4a5568; }
    .btn-secondary:hover { background: #3a4558; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .card { background: #16213e; padding: 1.2rem; border-radius: 8px; }
    .card h3 { margin: 0 0 0.3rem; color: #a8b2d1; font-size: 0.85rem; text-transform: uppercase; }
    .card .value { font-size: 1.8rem; font-weight: 700; color: #e94560; }
    .actions { margin-top: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    input[type="checkbox"] { width: 1.1rem; height: 1.1rem; accent-color: #e94560; }
    .text-red { color: #ff6b6b; }
    .text-green { color: #69db7c; }
    .text-muted { color: #666; }
    .text-bold { font-weight: 700; }
    td.delete-yes { color: #ff6b6b; font-weight: 700; }
    td.delete-no { color: #69db7c; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Opruimarr</span>
    <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{% url 'movies' %}" {% if request.resolver_match.url_name == 'movies' %}class="active"{% endif %}>Movies</a>
    <a href="{% url 'series' %}" {% if request.resolver_match.url_name == 'series' %}class="active"{% endif %}>Series</a>
  </nav>
  <div class="container">
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
